<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand" href="#" aria-label="Netflix Clone home">NETFLIX</a>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#">Home</a>
          <a href="#">Series</a>
          <a href="#">Films</a>
          <a href="#">New &amp; Popular</a>
          <a href="#">My List</a>
        </nav>
      </div>
      <div class="toolbar">
        <label class="search-shell" for="searchInput">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Titles, genres, moods">
        </label>
        <button class="profile-button" type="button" aria-label="Profile">A</button>
      </div>
    </header>

    <main>
      <section class="hero-layout">
        <article class="hero-stage" id="heroStage">
          <div class="hero-backdrop" id="heroBackdrop" aria-hidden="true"></div>
          <div class="hero-sheen" aria-hidden="true"></div>
          <div class="hero-copy">
            <p class="hero-label" id="heroBadge"></p>
            <h1 id="heroTitle"></h1>
            <div class="hero-meta">
              <span class="match" id="heroMatch"></span>
              <span id="heroYear"></span>
              <span class="meta-pill" id="heroMaturity"></span>
              <span id="heroDuration"></span>
            </div>
            <p class="hero-description" id="heroDescription"></p>
            <div class="tag-list" id="heroTags"></div>
            <div class="hero-actions">
              <button class="button button-primary" id="playButton" type="button">Play</button>
              <button class="button button-secondary" id="listButton" type="button">+ My List</button>
            </div>
            <p class="hero-note" id="heroNote">Select a title to update the feature banner.</p>
          </div>
        </article>

        <aside class="sidebar-card">
          <div class="sidebar-block">
            <p class="section-kicker">Tonight's Pick</p>
            <h2 id="spotlightTitle"></h2>
            <p class="sidebar-text" id="spotlightBlurb"></p>
          </div>

          <div class="sidebar-block">
            <div class="sidebar-heading">
              <p class="section-kicker">Continue Watching</p>
              <span class="sidebar-small" id="continueCount"></span>
            </div>
            <div class="continue-list" id="continueList"></div>
          </div>

          <div class="sidebar-block">
            <div class="sidebar-heading">
              <p class="section-kicker">Queue</p>
              <span class="sidebar-small">Curated for you</span>
            </div>
            <div class="queue-list" id="queueList"></div>
          </div>
        </aside>
      </section>

      <section class="controls-panel">
        <div class="controls-top">
          <div>
            <p class="section-kicker">Browse</p>
            <h2>Find your next binge</h2>
          </div>
          <p class="results-copy" id="resultsCopy"></p>
        </div>
        <div class="chip-row" id="filterChips" aria-label="Genre filters"></div>
      </section>

      <section class="rows-shell" id="rowsShell" aria-live="polite"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
